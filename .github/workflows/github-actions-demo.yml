# .github/workflows/ci.yml
name: CI/CD

# Триггеры: пуш или PR в любую ветку
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    # У нас нужен именно Linux, чтобы нативный .node был в формате ELF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'       # или версия вашего Node

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 from source
        run: npm rebuild better-sqlite3 --build-from-source

      - name: Build bundle with ncc
        run: npx ncc build src/index.ts -m -o dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist
